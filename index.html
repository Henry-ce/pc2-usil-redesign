<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login USIL - Rediseño</title>
    <style>
        :root {
            --azul-usil: #1d438a;
            --blanco: #ffffff;
            --texto-suave: #666666;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--blanco);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        /* Logo similar a tu Figma */
        .logo-usil {
            font-size: 60px;
            font-weight: bold;
            color: var(--azul-usil);
            font-style: italic;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--azul-usil);
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            font-size: 12px;
            color: var(--texto-suave);
            margin-left: 5px;
        }

        /* Inputs con bordes redondeados como tu Figma */
        input {
            width: 100%;
            height: 44px; /* Cumple con norma táctil de 44px */
            border: 1px solid #b3c1d9;
            border-radius: 10px;
            padding: 0 15px;
            box-sizing: border-box;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Botón Ingresar igual a tu Figma */
        .btn-ingresar {
            width: 100%;
            height: 48px;
            background-color: var(--azul-usil);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
        }

        .btn-ingresar:active {
            transform: scale(0.96);
            background-color: #15336a;
        }

        .forgot-password {
            display: block;
            margin-top: 15px;
            color: var(--azul-usil);
            text-decoration: underline;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-usil">USIL</div>
        <h1>BIENVENIDO</h1>

        <form id="loginForm">
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" placeholder="Escribir usuario" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" placeholder="Escribir contraseña" required>
            </div>

            <button type="submit" class="btn-ingresar">Ingresar</button>
        </form>

        <a href="#" class="forgot-password">¿Olvidasate tu contraseña?</a>
    </div>

    <script>
        // Esto soluciona la "Falta de retroalimentación" del Caso 1
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("¡Ingreso exitoso! Retroalimentación del sistema: Bienvenido Henry.");
        });
    </script>

</body>
</html>
