<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login USIL</title>
    <style>
        :root { --azul: #1d438a; }
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #fff; }
        .card { width: 320px; text-align: center; padding: 20px; }
        .logo { font-size: 50px; font-weight: bold; color: var(--azul); font-style: italic; margin-bottom: 10px; }
        h1 { color: var(--azul); font-size: 22px; letter-spacing: 1px; margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; color: #666; display: block; margin-bottom: 5px; }
        input { width: 100%; height: 45px; border: 1px solid #ccc; border-radius: 10px; padding: 0 12px; box-sizing: border-box; font-size: 16px; }
        /* Botón con feedback visual y tamaño táctil de 48px */
        button { 
            width: 100%; height: 48px; background: var(--azul); color: white; border: none; 
            border-radius: 25px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .link { display: block; margin-top: 15px; color: var(--azul); font-size: 13px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">USIL</div>
        <h1>BIENVENIDO</h1>
        
        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="user" placeholder="Escribir usuario">
        </div>
        
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="pass" placeholder="Escribir contraseña">
        </div>

        <button type="button" onclick="validarIngreso()">Ingresar</button>
        
        <a href="#" class="link">¿Olvidaste tu contraseña?</a>
    </div>

    <script>
        function validarIngreso() {
            const user = document.getElementById('user').value;
            if(user === "") {
                alert("Por favor, ingresa tu usuario.");
            } else {
                alert("¡Ingreso exitoso! Bienvenido " + user);
                // Redirige a la pantalla de cursos
                window.location.href = 'principal.html';
            }
        }
    </script>
</body>
</html>
