<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login USIL - Rediseño Accesible</title>
    <style>
        /* Estilos basados en tu paleta de colores y normas WCAG */
        :root {
            --azul-usil: #1d438a; /* Azul con buen contraste */
            --blanco: #ffffff;
            --gris-suave: #f4f4f4;
            --texto-negro: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--blanco);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--texto-negro);
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 150px;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--azul-usil);
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #666;
        }

        /* Ajuste táctil: Altura mínima de 44px para cumplir con diseño móvil */
        input[type="text"], input[type="password"] {
            width: 100%;
            height: 48px; 
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 0 15px;
            box-sizing: border-box;
            font-size: 16px; /* Evita zoom automático en iOS */
        }

        /* Botón con Affordance claro y Contraste AA (Norma ADA) */
        .btn-ingresar {
            width: 100%;
            height: 50px;
            background-color: var(--azul-usil);
            color: white;
            border: none;
            border-radius: 25px; /* Bordes redondeados según tu diseño */
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .btn-ingresar:active {
            background-color: #15336a; /* Feedback visual al presionar */
            transform: scale(0.98);
        }

        .link-olvido {
            display: block;
            margin-top: 15px;
            color: var(--azul-usil);
            text-decoration: underline;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">
            <h2 style="color: var(--azul-usil); font-style: italic; font-size: 40px;">USIL</h2>
        </div>

        <h1>BIENVENIDO</h1>

        <form action="#">
            <div class="input-group">
                <label for="user">Usuario</label>
                <input type="text" id="user" placeholder="Escribir usuario" aria-label="Ingresar usuario">
            </div>

            <div class="input-group">
                <label for="pass">Contraseña</label>
                <input type="password" id="pass" placeholder="Escribir contraseña" aria-label="Ingresar contraseña">
            </div>

            <button type="submit" class="btn-ingresar">Ingresar</button>
        </form>

        <a href="#" class="link-olvido">¿Olvidaste tu contraseña?</a>
    </div>

</body>
</html>
